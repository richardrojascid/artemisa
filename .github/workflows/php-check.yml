name: PHP Check

on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop]

jobs:
  php-check:
    name: Sintaxis y extensiones
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_sqlite, zip, sqlite3, mbstring, curl, openssl

      - name: Verificar extensiones requeridas
        run: |
          php -r "
          \$required = ['pdo_sqlite', 'zip', 'sqlite3', 'json', 'mbstring', 'curl', 'openssl'];
          \$missing = array_values(array_filter(\$required, fn (\$ext) => !extension_loaded(\$ext)));
          if (\$missing !== []) {
              fwrite(STDERR, 'Extensiones faltantes: ' . implode(', ', \$missing) . PHP_EOL);
              exit(1);
          }
          echo 'OK: extensiones requeridas disponibles' . PHP_EOL;
          "

      - name: Verificar sintaxis PHP
        run: |
          failed=0
          while IFS= read -r -d '' file; do
            if ! php -l "$file"; then
              failed=1
            fi
          done < <(find . -name '*.php' -not -path './.git/*' -print0)

          if [ "$failed" -ne 0 ]; then
            echo "Hay archivos PHP con errores de sintaxis."
            exit 1
          fi

          echo "OK: sintaxis PHP validada en todos los archivos .php"
